name: CI/CD Mundialito2026 Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend - React/Vite
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias frontend
        run: npm ci

      - name: Crear variables frontend para build
        run: |
          echo "VITE_API_BASE_URL=http://localhost:8000/api/v1" >> .env.local
          echo "VITE_USE_MOCKS=false" >> .env.local

      - name: Compilar frontend
        run: npm run build

  backend:
    name: Backend - Flask/Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear variables backend para validación
        run: |
          echo "FLASK_ENV=testing" >> .env
          echo "FLASK_DEBUG=false" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "DB_NAME=mundialito2026" >> .env
          echo "JWT_SECRET=test_secret" >> .env
          echo "CORS_ORIGINS=http://localhost:5173" >> .env
          echo "PAYMENT_PROVIDER=mock" >> .env
          echo "NOTIFICATIONS_ENABLED=true" >> .env
          echo "MAX_TICKET_RESERVATIONS_PER_DAY=20" >> .env
          echo "MAX_TICKET_TRANSFERS_PER_DAY=3" >> .env
          echo "MAX_TICKET_REFUNDS_PER_DAY=3" >> .env
          echo "ANTIFRAUD_WINDOW_HOURS=24" >> .env
          echo "FRAUD_AUTO_SUSPEND_THRESHOLD=10" >> .env

      - name: Validar sintaxis de Python
        run: |
          python -m compileall .

  ci-ok:
    name: CI completado
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Confirmar resultado
        run: echo "Frontend y backend compilaron correctamente."